services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: worldcup
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d worldcup"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=postgres;Database=worldcup;Username=admin;Password=secret
      - FootballApi__BaseUrl=https://v3.football.api-sports.io/
      - FootballApi__ApiKey=${FOOTBALL_API_KEY}
      - FootballApi__LeagueId=1
      - FootballApi__Season=2026
      - Jwt__Secret=${JWT_SECRET:-super-secret-key-change-in-production-min-32-chars}
      - Jwt__ExpirationHours=24
      - Redis__ConnectionString=redis:6379

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  pgdata:
